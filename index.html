<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的极简小游戏中心</title>
    <style>
        /* 网站基础样式 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #333;
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        main {
            max-width: 800px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 游戏区域样式 */
        .game-container {
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-sizing: border-box;
        }

        .score-board {
            font-size: 20px;
            margin-bottom: 20px;
            color: #555;
        }

        #score {
            font-weight: bold;
            color: #ff4757;
        }

        /* 游戏画布区域 */
        #game-canvas {
            width: 100%;
            height: 300px;
            background-color: #2f3542;
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        /* 下落的方块 */
        #target {
            width: 40px;
            height: 40px;
            background-color: #1e90ff;
            border-radius: 6px;
            position: absolute;
            top: 0;
            left: 50%;
        }

        /* 底部操作按钮 */
        .btn {
            background-color: #2ed573;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 25px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #26af5f;
        }

        .instructions {
            margin-top: 15px;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 我的极简小游戏中心</h1>
    </header>

    <main>
        <div class="game-container">
            <h2>游戏：手速戳方块 (Speed Click)</h2>
            <div class="score-board">当前得分: <span id="score">0</span></div>
            
            <!-- 游戏舞台 -->
            <div id="game-canvas">
                <div id="target"></div>
            </div>

            <button class="btn" id="start-btn">开始游戏</button>
            <p class="instructions">玩法说明：点击开始后，蓝色方块会随机掉落。在方块掉出边界前**点击它**即可得分！速度会越来越快哦！</p>
        </div>
    </main>

    <script>
        // 游戏逻辑 JavaScript
        const canvas = document.getElementById('game-canvas');
        const target = document.getElementById('target');
        const startBtn = document.getElementById('start-btn');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameInterval;
        let isPlaying = false;
        let speed = 2; // 初始下落速度
        let posY = 0;
        let posX = 0;

        // 随机改变方块的水平位置
        function resetTarget() {
            posY = 0;
            const maxLeft = canvas.clientWidth - 40; // 减去方块宽度
            posX = Math.floor(Math.random() * maxLeft);
            target.style.left = posX + 'px';
            target.style.top = posY + 'px';
        }

        // 每一帧的更新函数
        function updateGame() {
            posY += speed;
            target.style.top = posY + 'px';

            // 判断方块是否掉出底部
            if (posY > canvas.clientHeight) {
                endGame();
            }
        }

        // 开始游戏
        function startGame() {
            if (isPlaying) return;
            isPlaying = true;
            score = 0;
            speed = 3;
            scoreDisplay.innerText = score;
            startBtn.style.display = 'none';
            resetTarget();
            // 每20毫秒刷新一次位置（大约50FPS）
            gameInterval = setInterval(updateGame, 20);
        }

        // 结束游戏
        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);
            alert('游戏结束！你的最终得分是: ' + score);
            startBtn.style.display = 'inline-block';
            startBtn.innerText = '再玩一次';
            target.style.top = '0px';
        }

        // 点中方块加分
        target.addEventListener('click', function(event) {
            if (!isPlaying) return;
            score += 1;
            scoreDisplay.innerText = score;
            
            // 每得5分，速度加快一点
            if (score % 5 === 0) {
                speed += 1;
            }
            
            resetTarget();
            event.stopPropagation(); // 防止事件冒泡
        });

        // 点击开始按钮
        startBtn.addEventListener('click', startGame);

        // 页面加载时先隐藏方块，点击开始才出现
        target.style.top = '-50px';
    </script>
</body>
</html>
